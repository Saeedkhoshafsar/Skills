name: behavioral-eval

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Scenario to run
        required: true
        default: all
        type: choice
        options:
          - all
          - vague-idea-no-code
          - unconfirmed-brief-pressure
          - resume-from-state
          - conflicting-evidence-recovery
          - capability-overload
          - unsafe-skill-candidate
          - release-with-missing-evidence
          - done-without-fresh-proof
      model:
        description: Generation model
        required: true
        default: gpt-5-mini
        type: string
      judge_model:
        description: Judge model (blank uses generation model)
        required: false
        default: ""
        type: string
      fail_under:
        description: Required overall pass rate
        required: true
        default: "0.8"
        type: string

permissions:
  contents: read

concurrency:
  group: behavioral-eval-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMART_EVAL_API_KEY: ${{ secrets.SMART_EVAL_API_KEY }}
      SMART_EVAL_BASE_URL: ${{ secrets.SMART_EVAL_BASE_URL }}
      SMART_EVAL_MODEL: ${{ inputs.model }}
      SMART_EVAL_JUDGE_MODEL: ${{ inputs.judge_model }}
      SCENARIO: ${{ inputs.scenario }}
      FAIL_UNDER: ${{ inputs.fail_under }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required configuration
        shell: bash
        run: |
          mkdir -p .smart/evidence
          if [[ -z "$SMART_EVAL_API_KEY" ]]; then
            echo "SMART_EVAL_API_KEY repository secret is not configured." | tee .smart/evidence/behavioral-eval.log
            exit 1
          fi
          if [[ -z "$SMART_EVAL_BASE_URL" ]]; then
            echo "SMART_EVAL_BASE_URL repository secret is not configured." | tee .smart/evidence/behavioral-eval.log
            exit 1
          fi

      - name: Run SMART behavioral evaluation
        shell: bash
        run: |
          set +e
          args=(
            --model "$SMART_EVAL_MODEL"
            --fail-under "$FAIL_UNDER"
            --output .smart/evidence/behavioral-eval.json
          )
          if [[ -n "$SMART_EVAL_JUDGE_MODEL" ]]; then
            args+=(--judge-model "$SMART_EVAL_JUDGE_MODEL")
          fi
          if [[ "$SCENARIO" != "all" ]]; then
            args+=(--scenario "$SCENARIO")
          fi
          python3 skills/smart/skills/smart/evals/run_behavioral_evals.py "${args[@]}" \
            2>&1 | tee .smart/evidence/behavioral-eval.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> .smart/evidence/behavioral-eval.log
          exit "$status"

      - name: Upload behavioral evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smart-behavioral-eval-${{ github.run_id }}
          path: .smart/evidence/
          if-no-files-found: error
          retention-days: 30
